<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>岡山 近くの神社まつり</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1108;--paper:#fdf8f0;--red:#b51f1f;--red-lt:#fdf0ee;
  --gold:#c8860a;--gold-lt:#fef7e0;--muted:#7a6a55;--border:#e8dcc8;
  --panel:#fff;--sans:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:var(--sans)}
#shell{display:flex;flex-direction:column;height:100vh}
#header{background:var(--ink);color:#fff;padding:0 14px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#header h1{font-size:15px;font-weight:600;flex:1}
#sub{font-size:11px;opacity:.6}
#toolbar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0}
.tb-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--paper);color:var(--muted);cursor:pointer;white-space:nowrap;transition:.15s}
.tb-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.tb-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
select{font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:8px;background:var(--paper);color:var(--ink);cursor:pointer}
#status-bar{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap}
#body{display:flex;flex:1;overflow:hidden}
#map{flex:1}
#panel{width:290px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#panel-head{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--paper)}
#panel-head h2{font-size:13px;font-weight:600}
#panel-head p{font-size:11px;color:var(--muted);margin-top:2px}
#list{flex:1;overflow-y:auto}
.card{padding:10px 12px;border-bottom:1px solid #f5ede0;cursor:pointer;position:relative;transition:background .1s}
.card:hover{background:var(--paper)}
.card.active{background:var(--red-lt);border-left:3px solid var(--red)}
.card-rank{position:absolute;top:10px;right:10px;font-size:10px;color:var(--muted)}
.card-name{font-size:13px;font-weight:600;color:var(--ink)}
.card-dist{display:inline-block;font-size:11px;background:var(--gold-lt);color:var(--gold);border-radius:4px;padding:1px 6px;margin-top:3px}
.card-soon{display:inline-block;font-size:11px;background:var(--red-lt);color:var(--red);border-radius:4px;padding:1px 6px;margin-top:3px;margin-left:4px}
.card-fest{font-size:12px;color:var(--red);margin-top:3px;font-weight:500}
.card-date{font-size:11px;color:var(--muted);margin-top:1px}
.card-addr{font-size:11px;color:var(--muted);margin-top:3px}
#empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;display:none}
#hint{padding:20px 14px;font-size:12px;color:var(--muted);line-height:1.8;text-align:center}
#legend{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@media(max-width:600px){#panel{display:none}}
</style>
</head>
<body>
<div id="shell">
  <header id="header">
    <span style="font-size:20px">⛩</span>
    <h1>近くの神社まつり</h1>
    <span id="sub">岡山県 1610社</span>
  </header>
  <div id="toolbar">
    <button class="tb-btn primary" id="btn-gps">📍 現在地から探す</button>
    <button class="tb-btn" id="btn-click">🗺 地図をクリックして探す</button>
    <select id="sel-range">
      <option value="5">5km以内</option>
      <option value="10" selected>10km以内</option>
      <option value="20">20km以内</option>
      <option value="50">50km以内</option>
      <option value="999">距離制限なし</option>
    </select>
    <select id="sel-month">
      <option value="0">時期: すべて</option>
      <option value="1">1月</option><option value="2">2月</option>
      <option value="3">3月</option><option value="4">4月</option>
      <option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8">8月</option>
      <option value="9">9月</option><option value="10">10月</option>
      <option value="11">11月</option><option value="12">12月</option>
    </select>
    <span id="status-bar">祭典情報あり 781社</span>
  </div>
  <div id="body">
    <div id="map"></div>
    <div id="panel">
      <div id="panel-head">
        <h2 id="ph-title">神社まつり検索</h2>
        <p id="ph-sub">現在地または地図をクリックして検索</p>
      </div>
      <div id="list">
        <div id="hint">📍「現在地から探す」をタップするか<br>地図をクリックすると<br>近くのお祭りを距離・時期順に表示します</div>
        <div id="empty">条件に合うお祭りが<br>見つかりませんでした</div>
      </div>
      <div id="legend">
        <div class="leg"><div class="leg-dot" style="background:#b51f1f"></div>祭典あり</div>
        <div class="leg"><div class="leg-dot" style="background:#aaa"></div>祭典情報なし</div>
        <div class="leg"><div class="leg-dot" style="background:#f59e0b;width:12px;height:12px"></div>検索地点</div>
      </div>
    </div>
  </div>
</div>

let map, markers=[], originMarker=null, clickMode=false;
let originLat=null, originLng=null;
const thisMonth = new Date().getMonth()+1;

map = L.map("map").setView([34.97,133.85],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom:19
}).addTo(map);

const mkIcon = (color, size) => L.divIcon({
  html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid white;margin:${-size/2}px 0 0 ${-size/2}px;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>`,
  iconSize:[0,0], className:""
});
const redIcon  = mkIcon("#b51f1f", 14);
const grayIcon = mkIcon("#aaa", 10);
const goldIcon = mkIcon("#f59e0b", 18);

map.on("click", e=>{
  if(!clickMode) return;
  setOrigin(e.latlng.lat, e.latlng.lng, "クリックした地点");
  clickMode=false;
  document.getElementById("btn-click").classList.remove("active");
});

function dist(a,b,c,d){
  const R=6371, dL=(c-a)*Math.PI/180, dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function monthsUntil(m){
  if(!m) return 999;
  let d = m - thisMonth;
  if(d<0) d+=12;
  return d;
}

function setOrigin(lat,lng,label){
  originLat=lat; originLng=lng;
  if(originMarker) map.removeLayer(originMarker);
  originMarker = L.marker([lat,lng],{icon:goldIcon, zIndexOffset:1000})
    .addTo(map).bindPopup(label).openPopup();
  map.setView([lat,lng],13);
  search();
}

function search(){
  if(originLat===null) return;
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  const range = parseInt(document.getElementById("sel-range").value);
  const month = parseInt(document.getElementById("sel-month").value);

  let results = SHRINES
    .filter(s=>s.lat&&s.lng)
    .map(s=>{
      const km = dist(originLat,originLng,s.lat,s.lng);
      const fests = (s.festivals||[]).filter(f=>f.name||f.date_str);
      const nm = fests.length ? Math.min(...fests.map(f=>monthsUntil(f.month))) : 999;
      return {...s, km, fests, nearestMonth:nm};
    })
    .filter(s=>{
      if(s.km>range) return false;
      if(month===0) return true;
      return (s.festivals||[]).some(f=>f.month===month);
    })
    .sort((a,b)=>{
      const sa=(a.km/Math.max(range,1))*0.4+(a.nearestMonth/12)*0.6;
      const sb=(b.km/Math.max(range,1))*0.4+(b.nearestMonth/12)*0.6;
      return sa-sb;
    });

  results.slice(0,100).forEach(s=>{
    const icon = s.fests.length ? redIcon : grayIcon;
    const m = L.marker([s.lat,s.lng],{icon}).addTo(map);
    const fh = s.fests.slice(0,3).map(f=>
      `<div style="color:#b51f1f;font-weight:600;margin-top:4px;font-size:12px">⛩ ${f.name||"祭典"}</div><div style="color:#888;font-size:11px">${f.date_str||""}</div>`
    ).join("");
    m.bindPopup(`<div style="font-family:sans-serif;min-width:190px;max-width:240px">
      <b style="font-size:14px">${s.name}</b>
      <div style="color:#888;font-size:12px;margin:3px 0">距離: <b style="color:#333">${s.km.toFixed(1)}km</b></div>
      <div style="color:#888;font-size:12px">${s.address||""}</div>
      <div style="color:#888;font-size:12px">御祭神: ${s.deity||"—"}</div>
      ${fh||'<div style="color:#888;font-size:12px;margin-top:4px">祭典情報なし</div>'}
      <a href="${s.url}" target="_blank" style="display:inline-block;margin-top:6px;font-size:11px;color:#b51f1f">神社庁ページ →</a>
    </div>`);
    markers.push(m);
  });
  renderList(results);
}

function renderList(results){
  const list=document.getElementById("list"), empty=document.getElementById("empty");
  document.getElementById("hint").style.display="none";
  list.querySelectorAll(".card").forEach(c=>c.remove());
  document.getElementById("ph-title").textContent="検索結果";
  document.getElementById("ph-sub").textContent=`${results.length}件 (${document.getElementById("sel-range").value}km以内)`;
  if(!results.length){empty.style.display="block";return;}
  empty.style.display="none";
  results.slice(0,60).forEach((s,i)=>{
    const card=document.createElement("div");
    card.className="card"; card.dataset.id=s.id;
    const fh=s.fests.slice(0,2).map(f=>`<div class="card-fest">${f.name||"祭典"}</div><div class="card-date">${f.date_str||""}</div>`).join("");
    const soon=s.nearestMonth<999?`<span class="card-soon">${s.nearestMonth===0?"今月":s.nearestMonth+"ヶ月後"}</span>`:"";
    card.innerHTML=`
      <div class="card-rank">${i+1}位</div>
      <div class="card-name">${s.name}</div>
      <span class="card-dist">${s.km.toFixed(1)}km</span>${soon}
      ${fh||'<div class="card-date" style="margin-top:4px">祭典情報なし</div>'}
      <div class="card-addr">${s.address||""}</div>`;
    card.addEventListener("click",()=>{
      map.setView([s.lat,s.lng],15);
      highlightCard(s.id);
    });
    list.appendChild(card);
  });
}

function highlightCard(id){
  document.querySelectorAll(".card.active").forEach(c=>c.classList.remove("active"));
  const c=document.querySelector(`.card[data-id="${id}"]`);
  if(c){c.classList.add("active");c.scrollIntoView({behavior:"smooth",block:"nearest"});}
}

document.getElementById("btn-gps").addEventListener("click",function(){
  if(!navigator.geolocation){alert("位置情報が使えません");return;}
  this.textContent="📍 取得中…";
  const btn=this;
  navigator.geolocation.getCurrentPosition(
    pos=>{setOrigin(pos.coords.latitude,pos.coords.longitude,"現在地");btn.textContent="📍 現在地から探す";},
    ()=>{alert("位置情報の取得に失敗しました");btn.textContent="📍 現在地から探す";}
  );
});

document.getElementById("btn-click").addEventListener("click",function(){
  clickMode=!clickMode;
  this.classList.toggle("active",clickMode);
});

document.getElementById("sel-range").addEventListener("change",search);
document.getElementById("sel-month").addEventListener("change",search);
</script>
